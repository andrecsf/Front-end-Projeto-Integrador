<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vincular Aluno</title>
    <link rel="stylesheet" href="cadastrarAluno.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><i class="fas fa-bars"></i><span class="menu-text">Menu</span></div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="../index.html"><i class="fas fa-chart-bar"></i> <span class="menu-text">Gerenciar cursos</span></a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <a href="javascript:history.back()" class="btn-back"><i class="fas fa-arrow-left"></i></a>
                    <h1 id="page-title">Cadastrar Aluno</h1>
                </div>
            </header>

            <section class="content-body">
                <form id="student-form" class="form-container">
                    <div class="form-group">
                        <label for="name">Nome completo:</label>
                        <input type="text" id="name" placeholder="Nome do aluno" required>
                    </div>

                    <div class="form-group">
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;" placeholder="email@exemplo.com" required>
                    </div>

                    <div style="display: flex; gap: 20px;">
                        <div class="form-group" style="flex: 1;">
                            <label for="matricula">Matrícula:</label>
                            <input type="text" id="matricula" placeholder="Nº Matrícula" required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="turma">Turma:</label>
                            <input type="text" id="turma" placeholder="Ex: ADS-2025" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="senha">Senha Temporária:</label>
                        <input type="password" id="senha" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;" placeholder="Defina uma senha" required>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-save">Finalizar Vínculo</button>
                        <button type="button" class="btn-cancel" onclick="history.back()">Cancelar</button>
                    </div>
                </form>
            </section>
        </main>
    </div>
    <script src="cadastrarAluno.js"></script>
</body>
</html>
