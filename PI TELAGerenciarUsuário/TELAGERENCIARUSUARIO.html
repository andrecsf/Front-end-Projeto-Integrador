<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gerenciar Usuário</title>
  <link rel="stylesheet" href="TELASTYLE.css">
</head>
<body>

<div class="container">

  <!-- Conteúdo principal -->
  <main class="main">

    <header class="header">
      <h1>Gerenciar Usuário</h1>
    </header>

    <!-- Busca -->
    <div class="search-box">
      <input type="text" placeholder="Buscar usuários...">
    </div>

    <!-- Filtros -->
    <div class="filters">
      <button class="active">Todos</button>
      <button>Alunos</button>
      <button>Coordenadores</button>
    </div>

    <!-- Botão -->
    <button class="add-btn">+ Adicionar Novo Usuário</button>

    <!-- Lista -->
    <div class="user-list">

      <div class="user-card">
        <div class="avatar">J</div>
        <div class="info">
          <strong>João Silva</strong>
          <span class="tag aluno">Aluno</span>
          <p>joao@email.com</p>
        </div>
        <a href="#">Editar</a>
      </div>

      <div class="user-card">
        <div class="avatar">M</div>
        <div class="info">
          <strong>Maria Santos</strong>
          <span class="tag coord">Coordenador</span>
          <p>maria@email.com</p>
        </div>
        <a href="#">Editar</a>
      </div>

      <div class="user-card">
        <div class="avatar">P</div>
        <div class="info">
          <strong>Pedro Costa</strong>
          <span class="tag aluno">Aluno</span>
          <p>pedro@email.com</p>
        </div>
        <a href="#">Editar</a>
      </div>

    </div>

  </main>

  <!-- Sidebar (AGORA À DIREITA) -->
  <aside class="sidebar">
    <h2>Menu</h2>
    <ul>
      <li>Início</li>
      <li>Perfil</li>
      <li>Gerenciar cursos</li>
      <li class="active">Usuários</li>
      <li>Documentos</li>
      <li>Configurações</li>
    </ul>
  </aside>

</div>

</body>
</html>
