<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Coordenador</title>
    <link rel="stylesheet" href="style-cadastro-coordenador.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-bars"></i>
                <span class="menu-text">Menu</span>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="#"><i class="fas fa-home"></i> <span class="menu-text">Início</span></a></li>
                    <li><a href="#"><i class="fas fa-user"></i> <span class="menu-text">Perfil</span></a></li>
                    <li><a href="index.html"><i class="fas fa-chart-bar"></i> <span class="menu-text">Gerenciar
                                cursos</span></a></li>
                    <li class="active"><a href="#"><i class="fas fa-users"></i> <span
                                class="menu-text">Usuários</span></a></li>
                    <li><a href="#"><i class="fas fa-file-alt"></i> <span class="menu-text">Documentos</span></a></li>
                    <li><a href="#"><i class="fas fa-cog"></i> <span class="menu-text">Configurações</span></a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <div class="user-text">
                        <p class="menu-text">Usuário</p>
                        <a href="#" class="menu-text">logout</a>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <a href="javascript:history.back()" class="btn-back">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <h1>Cadastrar Coordenador</h1>
                </div>
            </header>

            <section class="content-body">
                <form id="coordinator-form" class="form-container">
                    <!-- Nome Completo -->
                    <div class="form-group">
                        <label for="coordinator-name">Nome completo:</label>
                        <input type="text" id="coordinator-name" name="coordinator-name"
                            placeholder="Nome do coordenador" required>
                    </div>

                    <!-- E-mail -->
                    <div class="form-group">
                        <label for="coordinator-email">E-mail:</label>
                        <input type="email" id="coordinator-email" name="coordinator-email"
                            placeholder="email@exemplo.com" required>
                    </div>

                    <!-- Senha -->
                    <div class="form-group">
                        <label for="coordinator-password">Senha:</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="coordinator-password" name="coordinator-password"
                                placeholder="Digite uma senha" required>
                            <button type="button" class="btn-toggle-password" id="btn-toggle-password"
                                title="Mostrar/Ocultar senha">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Botões de Ação -->
                    <div class="form-actions">
                        <button type="submit" class="btn-save" id="btn-save">
                            Finalizar Vínculo
                        </button>
                        <button type="button" class="btn-cancel" id="btn-cancel" onclick="window.history.back()">
                            Cancelar
                        </button>
                    </div>
                </form>
            </section>
        </main>
    </div>
    <script src="script-cadastro-coordenador.js"></script>
</body>

</html>
