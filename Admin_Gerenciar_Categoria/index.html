<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Categoria</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <main class="content">
            <header class="top-bar">
                <i class="fas fa-arrow-left"></i> Cadastrar Categoria
            </header>

            <div class="form-container">
                <h2>Categorias</h2>
                <button class="btn-new">+ Cadastrar Nova Categoria</button>
                
                <form id="categoriaForm">
                    <div class="input-group">
                        <label>Categoria:</label>
                        <input type="text" id="nome" placeholder="Digite aqui nova categoria" required>
                    </div>
                    <div class="input-group">
                        <label>Carga Horária Semestre:</label>
                        <input type="text" id="cargaSemestre" placeholder="Ex: 50h" required>
                    </div>
                    <div class="input-group">
                        <label>Carga Horária Máxima:</label>
                        <input type="text" id="cargaMaxima" placeholder="Ex: 120h" required>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-save">Salvar</button>
                        <button type="button" class="btn-cancel" onclick="limparFormulario()">Cancelar</button>
                    </div>
                </form>
            </div>

            <div class="list-container">
                <h3>Categorias Cadastradas:</h3>
                <div id="listaCategorias">
                    </div>
            </div>
        </main>

        <aside class="sidebar">
            <div class="menu-header">
                <i class="fas fa-bars"></i> Menu
            </div>
            <nav>
                <ul>
                    <li><i class="fas fa-home"></i> Início</li>
                    <li><i class="fas fa-user"></i> Perfil</li>
                    <li><i class="fas fa-chart-bar"></i> Gerenciar cursos</li>
                    <li><i class="fas fa-users"></i> Usuários</li>
                    <li><i class="fas fa-file-alt"></i> Documentos</li>
                    <li><i class="fas fa-cog"></i> Configurações</li>
                </ul>
            </nav>
            <div class="user-footer">
                <i class="fas fa-user-circle"></i>
                <div>
                    <span>Usuário</span><br>
                    <small>logout</small>
                </div>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
