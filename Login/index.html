<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Senac</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="background-overlay">
        <div class="login-container">
            <header>
                <img src="https://www.sp.senac.br/o/senac-theme/images/logo_senac_default.png" alt="Logo Senac" class="logo">
                <h1>Bem-vindo</h1>
                <p>Faça login para ter acesso à sua conta.</p>
            </header>

            <div class="profile-selector">
                <button class="profile-card" onclick="selectProfile('admin')">
                    <span class="icon">👑</span>
                    <strong>Super Admin</strong>
                </button>
                <button class="profile-card" onclick="selectProfile('coordenador')">
                    <span class="icon">👨‍🏫</span>
                    <strong>Coordenador</strong>
                </button>
                <button class="profile-card active" onclick="selectProfile('aluno')">
                    <span class="icon">🎓</span>
                    <strong>Aluno</strong>
                </button>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <input type="email" placeholder="Informe seu e-mail *" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Informe sua senha *" required>
                </div>
                <button type="submit" class="btn-entrar">ENTRAR</button>
            </form>

            <footer>
                <p>Dúvidas? <strong>0800 000 000</strong></p>
                <p>Sistema de Gestão Acadêmica © 2026</p>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
