<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="tela-login" data-model-id="535:11">
        <img class="image" src="https://c.animaapp.com/WHtKgXqw/img/image-8.png" />
        <div class="rectangle"></div>
        
        <div class="conteudo-esquerdo">
            <img class="img" src="https://c.animaapp.com/WHtKgXqw/img/image-8-1@2x.png" />
            
            <div class="text-wrapper">Bem-vindo</div>
            <p class="div">Faça login para ter acesso à sua conta.</p>
            
            <!-- Botões de Perfil -->
            <div class="perfil-container">
                <button class="stat-card" id="btnSuperAdmin">
                    <img class="icon-img" src="https://c.animaapp.com/WHtKgXqw/img/fairytale@2x.png" />
                    <div class="text-wrapper-8">Super Admin</div>
                </button>
                
                <button class="stat-card-2" id="btnCoordenador">
                    <img class="icon-img" src="https://c.animaapp.com/WHtKgXqw/img/school-director@2x.png" />
                    <div class="text-wrapper-9">Coordenador</div>
                </button>
                
                <button class="stat-card-3" id="btnAluno">
                    <img class="icon-img" src="https://c.animaapp.com/WHtKgXqw/img/graduation-cap@2x.png" />
                    <div class="text-wrapper-10">Aluno</div>
                </button>
            </div>
            
            <!-- Campo de E-mail -->
            <input type="email" class="rectangle-2" placeholder="Informe seu e-mail*" />
            
            <!-- Campo de Senha -->
            <input type="password" class="rectangle-3" placeholder="Informe sua senha *" />
            
            <!-- Link Esqueci minha senha -->
            <div class="esqueci-senha">
                <a href="#" id="btnEsqueciSenha">Esqueci minha senha.</a>
            </div>
            
            <!-- Botão Entrar -->
            <button class="frame" id="btnEntrar">
                <div class="text-wrapper-6">ENTRAR</div>
            </button>
            
            <div class="text-wrapper-7">Dúvidas? 0800 000 000</div>
            <div class="paragraph">
                <p>Sistema de Gestão Acadêmica © 2026</p>
            </div>
        </div>
    </div>

    <script>
        // Adiciona funcionalidade aos botões
        document.getElementById('btnEntrar').addEventListener('click', function() {
            var email = document.querySelector('.rectangle-2').value;
            var senha = document.querySelector('.rectangle-3').value;
            
            if(email && senha) {
                alert('Tentativa de login com:\nE-mail: ' + email + '\nSenha: ' + '•'.repeat(senha.length));
            } else {
                alert('Por favor, preencha o e-mail e a senha!');
            }
        });
        
        document.getElementById('btnSuperAdmin').addEventListener('click', function() {
            alert('Login como Super Admin selecionado');
        });
        
        document.getElementById('btnCoordenador').addEventListener('click', function() {
            alert('Login como Coordenador selecionado');
        });
        
        document.getElementById('btnAluno').addEventListener('click', function() {
            alert('Login como Aluno selecionado');
        });
        
        // Funcionalidade do Esqueci minha senha
        document.getElementById('btnEsqueciSenha').addEventListener('click', function(e) {
            e.preventDefault();
            alert('Instruções para recuperar sua senha serão enviadas para seu e-mail cadastrado.');
        });
    </script>
</body>
</html>
