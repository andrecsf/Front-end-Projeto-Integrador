<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Cursos</title>
    <link rel="stylesheet" href="cursos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-bars"></i>
                <span class="menu-text">Menu</span>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="#"><i class="fas fa-home"></i> <span class="menu-text">Início</span></a></li>
                    <li><a href="#"><i class="fas fa-user"></i> <span class="menu-text">Perfil</span></a></li>
                    <li class="active"><a href="#"><i class="fas fa-chart-bar"></i> <span class="menu-text">Gerenciar
                                cursos</span></a></li>
                    <li><a href="#"><i class="fas fa-users"></i> <span class="menu-text">Usuários</span></a></li>
                    <li><a href="#"><i class="fas fa-file-alt"></i> <span class="menu-text">Documentos</span></a></li>
                    <li><a href="#"><i class="fas fa-cog"></i> <span class="menu-text">Configurações</span></a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <div class="user-text">
                        <p class="menu-text">Usuário</p>
                        <a href="#" class="menu-text">logout</a>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <i class="fas fa-arrow-left"></i>
                    <h1>Gerenciar Cursos</h1>
                </div>
            </header>

            <section class="content-body">
                <div class="stats-container">
                    <div class="stat-card">
                        <h2 id="total-courses">0</h2>
                        <p>Total</p>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-card">
                        <h2 id="active-courses" class="text-green">0</h2>
                        <p>Ativos</p>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-card">
                        <h2 id="total-students" class="text-orange">0</h2>
                        <p>Alunos</p>
                    </div>
                </div>

                <div class="actions-container">
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="Buscar cursos...">
                    </div>
                    <button class="btn-add" onclick="window.location.href='cadastro.html'">
                        + Cadastrar Novo Curso
                    </button>
                </div>

                <div id="course-list" class="course-list">
                    <div class="empty-state">
                        <p>Nenhum curso cadastrado ainda.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="cursos.js"></script>
</body>

</html>
