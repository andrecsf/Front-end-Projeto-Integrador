<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Certificado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="estilo-visualizar.css">
</head>
<body>

    <div class="app-container">
        
        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center;">
                <div class="header-left" style="display: flex; align-items: center; gap: 15px;">
                    <i class="fa-solid fa-arrow-left" onclick="handleExit()" style="cursor: pointer;"></i>
                    <h2>Certificado do aluno <i class="fa-regular fa-bell" style="font-size: 0.9rem;"></i></h2>
                </div>

                <i class="fa-solid fa-bars" id="openMenu" title="Abrir Menu" style="cursor: pointer; font-size: 1.5rem;"></i>
            </header>

            <div class="container">
                <div class="card">
                    <div class="doc-info">
                        <div class="doc-icon">
                            <i class="fa-regular fa-file-lines"></i>
                        </div>
                        <div class="doc-text">
                            <strong>Documento Anexado:</strong>
                            <span>João Silva</span>
                            <small>14/03/2026 • 20h</small>
                        </div>
                    </div>

                    <div class="pdf-viewer-container" id="pdfWrapper">
                        <button class="expand-btn" onclick="toggleExpand()">
                            <i class="fa-solid fa-maximize" id="expandIcon"></i>
                        </button>
                        <iframe src="" id="pdf-frame"></iframe>
                    </div>

                    <div class="footer-actions">
                        <button class="btn-sair" onclick="handleExit()">Sair</button>
                    </div>
                </div>
            </div>
        </main>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-xmark" id="closeMenu" style="cursor: pointer;"></i>
                <span style="font-weight: 600;">Menu</span>
            </div>
            
            <ul class="nav-list">
                <li class="nav-item"><i class="fa-solid fa-house"></i> Início</li>
                <li class="nav-item"><i class="fa-solid fa-user"></i> Perfil</li>
                <li class="nav-item"><i class="fa-solid fa-chart-line"></i> Atividades</li>
                <li class="nav-item active"><i class="fa-solid fa-file"></i> Documentos</li>
                <li class="nav-item"><i class="fa-solid fa-gear"></i> Configurações</li>
            </ul>

            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fa-solid fa-circle-user"></i>
                    <div class="user-text">
                        <span>João Silva</span>
                        <a href="#" class="logout-link" onclick="handleExit()">logout</a>
                    </div>
                </div>
            </div>
        </aside>

    </div>

    <script src="visualizar-certificado.js"></script>
</body>
</html>
