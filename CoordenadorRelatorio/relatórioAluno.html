<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Relatório do Aluno</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TOPO -->
  <header class="topbar">
    <span class="icon">←</span>
    <h1>Relatório do Aluno</h1>
    <span class="icon">🔔</span>
  </header>

  <main class="container">

    <!-- CARD DO ALUNO -->
    <div class="card aluno">
      <h2>João Silva</h2>
      <p>120h / 200h obrigatórias</p>

      <div class="progress-area">
        <span>Progresso</span>
        <span id="percent">60%</span>
      </div>

      <div class="progress-bar">
        <div class="progress" id="progress"></div>
      </div>
    </div>

    <!-- ATIVIDADES -->
    <div class="card atividade">
      <h3>Participação em Hackathon</h3>
      <p>👤 João Silva</p>
      <p>📅 14/03/2026 - 20h</p>
      <span class="tag">Eventos Acadêmicos</span>
    </div>

    <div class="card atividade">
      <h3>Participação em Hackathon</h3>
      <p>👤 João Silva</p>
      <p>📅 14/03/2026 - 20h</p>
      <span class="tag">Eventos Acadêmicos</span>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
