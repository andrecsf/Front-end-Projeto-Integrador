<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Curso</title>
    <link rel="stylesheet" href="cursoDetalhes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-bars"></i>
                <span class="menu-text">Menu</span>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="../GerenciarCurso/gerenciarCursos.html">
                            <i class="fas fa-chart-bar"></i>
                            <span class="menu-text">Gerenciar cursos</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Conteúdo principal -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <a href="../GerenciarCurso/gerenciarCursos.html" class="btn-back">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <h1>Detalhes do Curso</h1>
                </div>
            </header>

            <section class="content-body">
                <form id="course-details-form" class="form-container">

                    <!-- Nome -->
                    <div class="form-group">
                        <label for="course-name">Nome do curso:</label>
                        <input type="text" id="course-name" required>
                    </div>

                    <!-- Descrição -->
                    <div class="form-group">
                        <label for="course-description">Descrição:</label>
                        <textarea id="course-description" rows="4"></textarea>
                    </div>

                    <!-- Carga horária -->
                    <div class="form-group">
                        <label for="course-workload">Carga horária máxima:</label>
                        <input type="number" id="course-workload" required>
                    </div>

                    <!-- Botões -->
                    <div class="form-actions">
                        <button type="submit" class="btn-save">
                            Alterar Dados
                        </button>

                        <button type="button" class="btn-delete" onclick="deleteCourse()">
                            Excluir Curso
                        </button>

                        <button type="button"
                                class="btn-manage"
                                onclick="window.location.href='atividades.html'">
                            Gerenciar Atividades
                        </button>
                    </div>

                </form>
            </section>
        </main>
    </div>

    <script src="cursoDetalhes.js"></script>
</body>

</html>
